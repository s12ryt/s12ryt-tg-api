<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0c10">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="S12RYT AI API 聚合代理 — 配置面板">
  <title>S12RYT 配置面板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/web/style.css">
</head>
<body>
  <!-- 登入畫面（多模式） -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <!-- 品牌標誌（三種模式共用） -->
      <div class="login-brand" aria-hidden="true">
        <svg class="login-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>

      <!-- 載入中（telegram 模式 OTP 驗證 / 初始化偵測） -->
      <div id="login-loading">
        <div class="spinner" aria-label="載入中"></div>
        <h2>正在驗證登入</h2>
        <p id="login-msg">請稍候</p>
      </div>

      <!-- 帳密登入表單（password 模式） -->
      <div id="login-password" class="hidden">
        <h2>歡迎回來</h2>
        <p class="login-subtitle">登入 S12RYT 配置面板</p>
        <form id="login-form" autocomplete="on">
          <div class="login-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="login-username" name="username" autocomplete="username" placeholder="帳號" aria-label="帳號" required>
          </div>
          <div class="login-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-password-input" name="password" autocomplete="current-password" placeholder="密碼" aria-label="密碼" required>
            <button type="button" class="pwd-toggle" data-target="login-password-input" aria-label="顯示或隱藏密碼">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <button type="submit" class="btn-primary login-btn" id="login-submit">登入</button>
        </form>
        <p id="login-password-msg" class="login-error"></p>
      </div>

      <!-- 首次管理員引導（password 模式 + 無用戶） -->
      <div id="login-setup" class="hidden">
        <div class="setup-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h2>初始設定</h2>
        <p class="login-hint">建立第一個管理員帳號以開始使用</p>
        <form id="setup-form" autocomplete="off">
          <div class="login-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="setup-username" required placeholder="管理員帳號（3-64 字元）" aria-label="管理員帳號">
          </div>
          <div class="login-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="setup-password" required placeholder="密碼（至少 8 個字元）" aria-label="密碼">
            <button type="button" class="pwd-toggle" data-target="setup-password" aria-label="顯示或隱藏密碼">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="login-field">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="setup-password-confirm" required placeholder="確認密碼" aria-label="確認密碼">
            <button type="button" class="pwd-toggle" data-target="setup-password-confirm" aria-label="顯示或隱藏密碼">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <button type="submit" class="btn-primary login-btn" id="setup-submit">建立管理員</button>
        </form>
        <p id="setup-msg" class="login-error"></p>
      </div>
    </div>
  </div>

  <!-- 主應用 -->
  <div id="app" class="app hidden">
    <!-- 行動端側欄切換按鈕 -->
    <button class="mobile-nav-toggle" id="mobile-nav-toggle" aria-label="開啟選單" aria-expanded="false" aria-controls="sidebar">
      <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay" aria-hidden="true"></div>

    <!-- 側邊欄 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>S12RYT</h1>
        <span class="version-tag">配置面板</span>
      </div>

      <nav class="sidebar-nav" aria-label="主導航">
        <!-- 用戶選單 -->
        <div class="nav-group">
          <div class="nav-group-title">個人</div>
          <a href="#/dashboard" class="nav-item" data-route="dashboard">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></span>
            總覽
          </a>
          <a href="#/keys" class="nav-item" data-route="keys">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="5.5"/><path d="M11 13l9-9"/><path d="M16 7l2 2"/><path d="M19 4l2 2"/></svg></span>
            API Keys
          </a>
          <a href="#/usage" class="nav-item" data-route="usage">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg></span>
            用量統計
          </a>
          <a href="#/coding" class="nav-item" data-route="coding">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
            Coding 模式
          </a>
          <a href="#/limits" class="nav-item" data-route="limits">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
            我的限制
          </a>
          <a href="#/restrictions" class="nav-item" data-route="restrictions">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span>
            模型限制
          </a>
          <a href="#/account" class="nav-item hidden" data-route="account" id="nav-account">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg></span>
            個人設定
          </a>
        </div>

        <!-- 管理員選單（動態顯示） -->
        <div class="nav-group hidden" id="admin-nav">
          <div class="nav-group-title">管理</div>
          <a href="#/providers" class="nav-item" data-route="providers">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 2v6M15 2v6M9 8a3 3 0 0 0 6 0M2 12h20M5 12v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8"/></svg></span>
            供應商
          </a>
          <a href="#/users" class="nav-item" data-route="users">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
            用戶管理
          </a>
          <a href="#/web-users" class="nav-item hidden" data-route="web-users" id="nav-web-users">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><rect x="14" y="14" width="8" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="2"/><path d="M18 14v8M14 18h8"/></svg></span>
            Web 帳號
          </a>
          <a href="#/groups" class="nav-item" data-route="groups">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
            用戶分組
          </a>
          <a href="#/all-usage" class="nav-item" data-route="all-usage">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
            全域用量
          </a>
          <a href="#/api-test" class="nav-item" data-route="api-test">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 3h6M10 3v6.5L5 17a2 2 0 0 0 1.73 3h10.54A2 2 0 0 0 19 17l-5-7.5V3"/><line x1="7" y1="14" x2="17" y2="14"/></svg></span>
            API 測試
          </a>
          <a href="#/model-catch" class="nav-item" data-route="model-catch">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></span>
            模型抓取
          </a>
          <a href="#/model-mapping" class="nav-item" data-route="model-mapping">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg></span>
            模型映射
          </a>
          <a href="#/api-logs" class="nav-item" data-route="api-logs">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>
            API 日誌
          </a>
          <a href="#/system-usage" class="nav-item" data-route="system-usage">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l3-4 3 3 4-7"/><path d="M17 8h3v3"/></svg></span>
            系統佔用
          </a>
          <a href="#/plugins" class="nav-item" data-route="plugins">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M8 3v4"/><path d="M16 3v4"/><path d="M7 7h10a2 2 0 0 1 2 2v2H5V9a2 2 0 0 1 2-2z"/><path d="M6 11v4a6 6 0 0 0 12 0v-4"/><path d="M12 17v4"/></svg></span>
            插件管理
          </a>
          <a href="#/system" class="nav-item" data-route="system">
            <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></span>
            系統管理
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info" id="user-info">
          <span class="user-name" id="user-name">--</span>
          <span class="user-role" id="user-role">用戶</span>
        </div>
        <button class="btn-logout" id="btn-logout" title="登出" aria-label="登出">退出</button>
      </div>
    </aside>

    <!-- 主內容區 -->
    <main class="main-content" id="main-content">
      <!-- 由 JS 動態渲染 -->
    </main>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal 容器 -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">標題</h3>
        <button class="modal-close" id="modal-close" aria-label="關閉">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
